$kind: http-request
url: "{{baseUrl}}/api/chapters/{{chapterId}}/status"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{orgAdminToken}}
body:
  type: text
  content: '"NotARealStatus"'
scripts:
  - type: afterResponse
    code: pm.test('Status 400', () => pm.response.to.have.status(400));
order: 8000
