$kind: http-request
description: Upgrades listener to presenter. Revert after if needed.
url: "{{baseUrl}}/api/members/{{memberId}}/role"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{orgAdminToken}}
body:
  type: text
  content: |-
    {
      "role": "Presenter"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 204', () => pm.response.to.have.status(204));
order: 9000
