$kind: http-request
url: "{{baseUrl}}/api/members/{{memberId}}/status"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{orgAdminToken}}
body:
  type: text
  content: |-
    {
      "status": "Active"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 204', () => pm.response.to.have.status(204));
order: 4000
