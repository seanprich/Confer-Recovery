$kind: http-request
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "{{hostEmail}}",
      "password": "{{hostPassword}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const body = pm.response.json();
      pm.test('Role is Host', () => pm.expect(body.role).to.equal('Host'));
      pm.test('Token is non-empty JWT', () => {
        pm.expect(body.accessToken).to.be.a('string');
        pm.expect(body.accessToken.split('.')).to.have.length(3);
      });
      pm.collectionVariables.set('hostToken', body.accessToken);
      console.log('hostToken captured');
order: 1000
