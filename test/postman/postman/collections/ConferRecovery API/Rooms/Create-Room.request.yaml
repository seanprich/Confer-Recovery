$kind: http-request
name: Create Room
method: POST
url: '{{baseUrl}}/api/rooms'
order: 3000
description: 'Create a new room. Requires Host, ChapterAdmin, or OrgAdmin. Returns 201.'
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{hostToken}}'
body:
  type: json
  content: |-
    {
      "name": "Tuesday Evening Meeting",
      "chapterId": "{{chapterId}}",
      "scheduledAt": null
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json && json.id) {
          pm.collectionVariables.set("roomId", json.id);
      }
