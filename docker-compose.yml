services:
  server:
    build:
      context: .
      dockerfile: src/Server/Dockerfile
    image: confer-server:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - MongoDb__ConnectionString=mongodb://mongo:27017
      - MongoDb__DatabaseName=confer
      - MongoDb__Username=${MONGO_USERNAME}
      - MongoDb__Password=${MONGO_PASSWORD}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=confer
      - Jwt__Audience=confer-clients
      - Seed__AdminEmail=${SEED_ADMIN_EMAIL:-}
      - Seed__AdminPassword=${SEED_ADMIN_PASSWORD:-}
      - Seed__AdminDisplayName=${SEED_ADMIN_DISPLAY_NAME:-Admin}
      - Seed__ChapterName=${SEED_CHAPTER_NAME:-Default Chapter}
      - Seed__SfuUrl=${SEED_SFU_URL:-}
      - Seed__LiveKitApiKey=${SEED_LIVEKIT_API_KEY:-}
      - Seed__LiveKitApiSecret=${SEED_LIVEKIT_API_SECRET:-}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - server-logs:/app/logs
      - server-keys:/app/keys
    networks:
      - confer-net

  mongo:
    image: mongo:8
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=confer
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - confer-net
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      - server
    networks:
      - confer-net

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - confer-net

volumes:
  mongo-data:
  server-logs:
  server-keys:
  prometheus-data:
  grafana-data:

networks:
  confer-net:
    driver: bridge
